<div class="auth-container">
  <h2>Creează un cont nou</h2>
  
  <div *ngIf="errorMessage" class="error-alert">{{ errorMessage }}</div>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="nume">Nume</label>
      <input id="nume" type="text" formControlName="nume" />
      <span class="error-text" *ngIf="registerForm.get('nume')?.touched && registerForm.get('nume')?.invalid">Numele este obligatoriu.</span>
    </div>

    <div class="form-group">
      <label for="prenume">Prenume</label>
      <input id="prenume" type="text" formControlName="prenume" />
      <span class="error-text" *ngIf="registerForm.get('prenume')?.touched && registerForm.get('prenume')?.invalid">Prenumele este obligatoriu.</span>
    </div>

    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" formControlName="username" />
      <span class="error-text" *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.invalid">Username-ul este obligatoriu.</span>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" formControlName="email" />
      <span class="error-text" *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid">Introdu un email valid.</span>
    </div>

    <div class="form-group">
      <label for="password">Parolă</label>
      <input id="password" type="password" formControlName="password" />
      <span class="error-text" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">Parola e obligatorie (min 6 caractere).</span>
    </div>

    <button type="submit" [disabled]="registerForm.invalid || isLoading">
      {{ isLoading ? 'Se încarcă...' : 'Înregistrare' }}
    </button>
  </form>
  
  <p class="switch-page">Ai deja cont? <a routerLink="/login">Loghează-te aici</a></p>
</div>
